<svg width="1440" height="1100" viewBox="0 0 1440 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset=".54" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#EAF8F4"/>
    </linearGradient>
    <linearGradient id="hero" x1="72" y1="44" x2="1368" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10233D"/>
      <stop offset=".55" stop-color="#1E5BFF"/>
      <stop offset="1" stop-color="#0FB986"/>
    </linearGradient>
    <linearGradient id="primary" x1="102" y1="188" x2="894" y2="976" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D72FF"/>
      <stop offset="1" stop-color="#725DFF"/>
    </linearGradient>
    <linearGradient id="dark" x1="118" y1="198" x2="826" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1B31"/>
      <stop offset="1" stop-color="#203A67"/>
    </linearGradient>
    <linearGradient id="delivery" x1="118" y1="872" x2="826" y2="968" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FB986"/>
      <stop offset="1" stop-color="#2478F4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17345D" flood-opacity=".14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17345D" flood-opacity=".10"/>
    </filter>
    <marker id="arrowDown" markerWidth="12" markerHeight="12" refX="6" refY="10" orient="auto">
      <path d="M2 3L6 10L10 3" stroke="#496782" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowRight" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M3 2L10 6L3 10" stroke="#496782" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:38px;font-weight:880;fill:#102033}
      .subtitle{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:18px;font-weight:560;fill:#5D7088}
      .eyebrow{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:13px;font-weight:820;letter-spacing:.12em;fill:#62809E}
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:24px;font-weight:850;fill:#14243A}
      .stepTitle{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:22px;font-weight:850;fill:#14243A}
      .small{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:16px;font-weight:580;fill:#60738A}
      .mini{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:14px;font-weight:650;fill:#6F8095}
      .code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace;font-size:14px;font-weight:720;fill:#435D7C}
      .whiteLabel{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:24px;font-weight:860;fill:white}
      .whiteSmall{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:16px;font-weight:590;fill:rgba(255,255,255,.86)}
      .whiteCode{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace;font-size:14px;font-weight:720;fill:rgba(255,255,255,.88)}
      .num{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:18px;font-weight:860;fill:#FFFFFF}
      .green{fill:#167D68}
      .blue{fill:#1D5FE8}
    </style>
  </defs>

  <rect width="1440" height="1100" rx="36" fill="url(#bg)"/>
  <circle cx="1218" cy="162" r="264" fill="#DCEAFF" opacity=".72"/>
  <circle cx="158" cy="942" r="296" fill="#DDF8F2" opacity=".70"/>
  <path d="M0 166H1440" stroke="#DCE7F7"/>

  <text x="72" y="78" class="title">deck-library：竖向理解一条素材复用流水线</text>
  <text x="72" y="114" class="subtitle">先有 deck-h5 的 deck.json + 资源素材，再用 Skill 入库、检索、组合，最后仍交给 feishu-deck-h5 渲染和验证。</text>
  <rect x="72" y="132" width="560" height="34" rx="17" fill="url(#hero)" opacity=".10"/>
  <text x="96" y="154" class="eyebrow">FROM DECK OUTPUT TO REUSABLE PAGE MATERIALS</text>

  <g filter="url(#shadow)">
    <rect x="72" y="188" width="842" height="810" rx="32" fill="rgba(255,255,255,.72)" stroke="#DCE8F7"/>
    <text x="118" y="236" class="eyebrow">怎么用：从上到下执行</text>
    <text x="118" y="270" class="label">一条直线流程，不绕弯</text>

    <line x1="138" y1="332" x2="138" y2="888" stroke="#D9E6F5" stroke-width="4" stroke-linecap="round"/>

    <g filter="url(#softShadow)">
      <rect x="118" y="306" width="708" height="96" rx="24" fill="url(#dark)"/>
      <circle cx="138" cy="354" r="24" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.24)"/>
      <text x="129" y="361" class="num">1</text>
      <text x="184" y="342" class="whiteLabel">基础产物：deck.json + 资源素材</text>
      <text x="184" y="372" class="whiteSmall">deck-h5 / feishu-deck-h5 先产出标准结构和依赖资源。</text>
      <text x="184" y="394" class="whiteCode">assets / pages / images / logo</text>
    </g>

    <path d="M138 408V438" stroke="#496782" stroke-width="3" marker-end="url(#arrowDown)"/>

    <g filter="url(#softShadow)">
      <rect x="118" y="442" width="708" height="96" rx="24" fill="#FFFFFF" stroke="#DDE8FA"/>
      <circle cx="138" cy="490" r="24" fill="#E8F1FF" stroke="#D2E2FF"/>
      <text x="129" y="497" class="num" fill="#1D5FE8">2</text>
      <text x="184" y="478" class="stepTitle">安装与配置：Skill + 飞书多维表格</text>
      <text x="184" y="508" class="small">旁边安装 sibling feishu-deck-h5，创建 Decks 和 Materials 两张表。</text>
      <text x="184" y="530" class="code">skills/feishu-deck-h5/ + skills/deck-library/</text>
    </g>

    <path d="M138 544V574" stroke="#496782" stroke-width="3" marker-end="url(#arrowDown)"/>

    <g filter="url(#softShadow)">
      <rect x="118" y="578" width="708" height="96" rx="24" fill="#FFFFFF" stroke="#DDE8FA"/>
      <circle cx="138" cy="626" r="24" fill="#E8F1FF" stroke="#D2E2FF"/>
      <text x="129" y="633" class="num" fill="#1D5FE8">3</text>
      <text x="184" y="614" class="stepTitle">archive 入库：每页变成一个素材</text>
      <text x="184" y="644" class="small">生成素材编号、缩略图、中文描述和可组合的底层 payload。</text>
      <text x="184" y="666" class="code">M001 / thumbnail / 中文描述 / slide_payload_json</text>
    </g>

    <path d="M138 680V710" stroke="#496782" stroke-width="3" marker-end="url(#arrowDown)"/>

    <g filter="url(#softShadow)">
      <rect x="118" y="714" width="708" height="96" rx="24" fill="#FFFFFF" stroke="#CDEDEA"/>
      <circle cx="138" cy="762" r="24" fill="#E6FBF5" stroke="#C6EFE4"/>
      <text x="129" y="769" class="num" fill="#167D68">4</text>
      <text x="184" y="750" class="stepTitle">浏览 / 检索 / 选编号</text>
      <text x="184" y="780" class="small">人在多维表格里看缩略图，智能体按字段和语义检索。</text>
      <text x="184" y="802" class="code">选择 M001 + M008 + M012</text>
    </g>

    <path d="M138 816V846" stroke="#496782" stroke-width="3" marker-end="url(#arrowDown)"/>

    <g filter="url(#softShadow)">
      <rect x="118" y="850" width="708" height="96" rx="24" fill="url(#delivery)"/>
      <circle cx="138" cy="898" r="24" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.24)"/>
      <text x="129" y="905" class="num">5</text>
      <text x="184" y="886" class="whiteLabel">compose 组合 + deck-h5 渲染交付</text>
      <text x="184" y="916" class="whiteSmall">按编号生成新 deck.json，恢复资源，再运行渲染和验证。</text>
      <text x="184" y="938" class="whiteCode">render-deck.py --final → deck.json + index.html</text>
    </g>
  </g>

  <path d="M914 592H960" stroke="#496782" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="928" y="570" class="mini">沉淀结果</text>

  <g filter="url(#shadow)">
    <rect x="960" y="188" width="408" height="810" rx="32" fill="#FFFFFF" stroke="#DCE8F7"/>
    <rect x="1002" y="232" width="186" height="34" rx="17" fill="#E8FBF8"/>
    <text x="1022" y="254" class="eyebrow green">效果：它可以干什么</text>
    <text x="1002" y="306" class="label">把页面从“文件”变成“资产”</text>
    <text x="1002" y="334" class="small">不再只交付一份 H5，而是沉淀可复用页面组件。</text>

    <rect x="1002" y="380" width="324" height="102" rx="22" fill="#F3F7FF" stroke="#D9E6FF"/>
    <text x="1030" y="416" class="stepTitle" font-size="20">素材沉淀</text>
    <text x="1030" y="446" class="small">每页有缩略图、中文描述、质量标记。</text>
    <text x="1030" y="468" class="code">native_h5 / subtle motion</text>

    <rect x="1002" y="506" width="324" height="102" rx="22" fill="#F4FBFA" stroke="#CDEDEA"/>
    <text x="1030" y="542" class="stepTitle" font-size="20">可视化挑选</text>
    <text x="1030" y="572" class="small">人直接在飞书多维表格里看图选。</text>
    <text x="1030" y="594" class="code">M001 / M008 / M012</text>

    <rect x="1002" y="632" width="324" height="102" rx="22" fill="#F3F7FF" stroke="#D9E6FF"/>
    <text x="1030" y="668" class="stepTitle" font-size="20">智能组合</text>
    <text x="1030" y="698" class="small">Agent 不猜页面结构，直接读取 payload。</text>
      <text x="1030" y="720" class="code">slide_payload_json to new deck.json</text>

    <rect x="1002" y="758" width="324" height="102" rx="22" fill="#F4FBFA" stroke="#CDEDEA"/>
    <text x="1030" y="794" class="stepTitle" font-size="20">持续复用</text>
    <text x="1030" y="824" class="small">新交付物可以再次入库，素材库越用越厚。</text>
    <text x="1030" y="846" class="code">archive → compose → render</text>

    <rect x="1002" y="898" width="324" height="54" rx="20" fill="#10233D"/>
    <text x="1030" y="932" class="whiteSmall">最终交付：可发布的 H5 + 可继续复用的素材</text>
  </g>

  <rect x="72" y="1024" width="1296" height="44" rx="22" fill="rgba(16,35,61,.06)" stroke="rgba(16,35,61,.08)"/>
  <text x="104" y="1053" class="small">一句话：deck-library 不是渲染器，而是把 deck-h5 的页面资产化；渲染、验证和最终交付仍由 sibling feishu-deck-h5 完成。</text>
</svg>
